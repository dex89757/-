<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排班與業績管理系統</title>
    <style>
        :root { --blue: #007AFF; --red: #ff3b30; --green: #30d158; --bg: #000; --card: #1c1c1e; --purple: #af52de; --orange: #ff9500; --yellow: #ffcc00; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; user-select: none; font-size: 20px; font-weight: 300; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--green); padding: 15px 40px; border-radius: 50px; z-index: 9999; transition: 0.4s; font-size: 24px; }
        #toast.active { top: 30px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #111; display: flex; border-top: 1px solid #333; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; color: #888; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 28px; margin-bottom: 4px; }
        .container { padding: 20px; padding-bottom: 120px; display: none; }
        .container.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .staff-btn { background: #333; border-radius: 15px; padding: 20px 10px; text-align: center; position: relative; border: 2px solid transparent; }
        .staff-btn.in-rank { border-color: var(--blue); background: rgba(0,122,255,0.1); }
        .staff-btn.has-book { border-color: var(--orange); }
        .staff-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .staff-id { font-size: 14px; color: #888; }
        .badge { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 400px; border-radius: 30px; padding: 30px; }
        .btn-action { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #fff; }
        select, input { width: 100%; padding: 15px; border-radius: 10px; background: #333; border: 1px solid #444; color: #fff; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; }
        .log-item { background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .flex-1 { flex: 1; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onclick="handleGlobalClick(event)">

    <div id="toast">成功</div>

    <div id="page-rank" class="container active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="margin:0">排班看板</h1>
            <div>
                <button onclick="toggleMode()" style="background:none; border:1px solid #555; color:#888; padding:8px 15px; border-radius:10px;">切換視角</button>
                <button onclick="clearRank()" style="background:var(--red); border:none; color:#fff; padding:8px 15px; border-radius:10px; margin-left:10px;">清空</button>
            </div>
        </div>
        <div id="rank-grid" class="grid"></div>
    </div>

    <div id="page-staff" class="container">
        <h1>技師名單</h1>
        <div id="staff-grid" class="grid"></div>
    </div>

    <div id="page-history" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>歷史帳目</h1>
            <button onclick="clearAllLogs()" style="background:var(--red); border:none; color:#fff; padding:8px 15px; border-radius:10px;">清空全部紀錄</button>
        </div>
        <div id="history-list"></div>
    </div>

    <div id="page-book" class="container">
        <button onclick="showPage('page-rank')" style="background:none; border:none; color:var(--blue); font-size:18px; margin-bottom:20px;"><i class="fas fa-chevron-left"></i> 返回</button>
        <div class="card">
            <h2>新增預約/點台</h2>
            <label>選擇師傅</label>
            <select id="bookStaff"></select>
            <label>項目內容</label>
            <input type="text" id="bookNote" placeholder="例如：指壓、油壓...">
            <div class="row">
                <div class="flex-1">
                    <label>預約時間</label>
                    <input type="time" id="bookTime">
                </div>
                <div class="flex-1">
                    <label>所需分鐘</label>
                    <select id="bookDur"></select>
                </div>
            </div>
            <button class="btn-action" style="background:var(--orange)" onclick="addB()">確認預約</button>
        </div>
    </div>

    <div id="actModal" class="modal" onclick="closeM('actModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="actTitle" style="margin-top:0"></h2>
            <button class="btn-action" style="background:var(--green)" onclick="handleAct('amt')">結帳儲存</button>
            <button class="btn-action" style="background:var(--orange)" onclick="handleAct('book')">預約/點台</button>
            <button class="btn-action" style="background:var(--blue)" onclick="handleAct('log')">查看紀錄</button>
            <button class="btn-action" style="background:#444" onclick="closeM('actModal')">取消</button>
        </div>
    </div>

    <div id="amtModal" class="modal" onclick="closeM('amtModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>結帳金額</h2>
            <div id="priceBtnGroup" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;"></div>
            <input type="number" id="customAmt" placeholder="輸入其他金額">
            <button class="btn-action" style="background:var(--green)" onclick="hAmt()">確認儲存</button>
            <button class="btn-action" style="background:#444" onclick="closeM('amtModal')">返回</button>
        </div>
    </div>

    <div id="logModal" class="modal" onclick="closeM('logModal')">
        <div class="modal-content" style="max-width:500px" onclick="event.stopPropagation()">
            <h2 id="logTitle">個人紀錄</h2>
            <div id="logList" style="max-height:400px; overflow-y:auto; margin-bottom:20px;"></div>
            <button class="btn-action" style="background:#444" onclick="closeM('logModal')">關閉</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('page-rank')"><i class="fas fa-list-ol"></i><span>看板</span></div>
        <div class="nav-item" onclick="showPage('page-staff')"><i class="fas fa-users"></i><span>技師</span></div>
        <div class="nav-item" onclick="showPage('page-history')"><i class="fas fa-history"></i><span>帳目</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6brkw62LOPXdG6VVANPXA2ZRaM9nt66g",
            authDomain: "auto-accounting-55f62.firebaseapp.com",
            databaseURL: "https://auto-accounting-55f62-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "auto-accounting-55f62",
            storageBucket: "auto-accounting-55f62.firebasestorage.app",
            messagingSenderId: "409481971569",
            appId: "1:409481971569:web:e89046546627eef5d7d8d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 資料狀態
        const staffIds = [0, 1, 2, 5, 7, 9, 10, 11, 12, 13, 38, 100, 101];
        let staffData = [];
        let historyData = [];
        let curSid = null;
        let isBoss = false;

        // 初始化資料庫監聽
        onValue(ref(db, 'massageApp'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                staffData = data.staffData || [];
                historyData = data.historyData || [];
            }
            // 補齊 ID
            [...staffIds, -1, -2].forEach(id => {
                if(!staffData.find(s=>s.id===id)) staffData.push({id, inRank:false, joinTime:0, bookings:[], logs:[]});
            });
            render();
        });

        // 雲端儲存
        const save = () => {
            set(ref(db, 'massageApp'), {
                staffData: staffData,
                historyData: historyData,
                lastUpdated: Date.now()
            });
        };

        // UI 渲染與邏輯
        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2000);
        }

        function showPage(pid) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(pid).classList.add('active');
            document.querySelectorAll('.nav-item').forEach((n, i) => {
                n.classList.remove('active');
                if ((pid === 'page-rank' && i === 0) || (pid === 'page-staff' && i === 1) || (pid === 'page-history' && i === 2)) n.classList.add('active');
            });
        }

        function render() {
            // 看板渲染
            const rankGrid = document.getElementById('rank-grid');
            const inRankStaff = staffData.filter(s => s.inRank).sort((a, b) => a.joinTime - b.joinTime);
            rankGrid.innerHTML = inRankStaff.map(s => `
                <div class="staff-btn in-rank ${s.bookings.length ? 'has-book' : ''}" onclick="openAct(${s.id})">
                    <div class="staff-name">${s.id < 0 ? (s.id === -1 ? '1F' : '2F') : s.id}</div>
                    <div class="staff-id">${s.bookings.length ? s.bookings[0].time : '空閒'}</div>
                    ${s.bookings.length ? `<div class="badge">${s.bookings.length}</div>` : ''}
                </div>
            `).join('');

            // 技師頁渲染
            const staffGrid = document.getElementById('staff-grid');
            staffGrid.innerHTML = staffData.filter(s => s.id >= 0).sort((a, b) => a.id - b.id).map(s => `
                <div class="staff-btn ${s.inRank ? 'in-rank' : ''}" onclick="tRank(${s.id})">
                    <div class="staff-name">${s.id}</div>
                    <div class="staff-id">${s.inRank ? '上線中' : '休假'}</div>
                </div>
            `).join('');

            // 歷史帳目
            const histList = document.getElementById('history-list');
            histList.innerHTML = historyData.slice().reverse().map(h => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#888;">
                        <span>${h.date}</span><span>${h.time}</span>
                    </div>
                    <div style="font-size:24px; font-weight:bold;">${h.sid < 0 ? (h.sid === -1 ? '1F' : '2F') : '師傅 ' + h.sid} － $${h.amt}</div>
                    <div style="margin-top:5px; color:var(--green)">分成：$${Math.floor(h.amt * 0.7)} (0.7)</div>
                </div>
            `).join('');

            // 下拉選單更新
            const sel = document.getElementById('bookStaff');
            sel.innerHTML = staffData.filter(s => s.inRank).map(s => `<option value="${s.id}">${s.id < 0 ? (s.id === -1 ? '1F' : '2F') : s.id}</option>`).join('');
        }

        function tRank(sid) {
            const s = staffData.find(x => x.id === sid);
            s.inRank = !s.inRank;
            if (s.inRank) s.joinTime = Date.now();
            save();
            showToast();
        }

        function openAct(sid) {
            curSid = sid;
            document.getElementById('actTitle').innerText = sid < 0 ? (sid === -1 ? '1F 房間' : '2F 房間') : '師傅 ' + sid;
            document.getElementById('actModal').style.display = 'flex';
        }

        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function handleAct(type) {
            closeM('actModal');
            if (type === 'amt') document.getElementById('amtModal').style.display = 'flex';
            else if (type === 'book') showPage('page-book');
            else if (type === 'log') openLog(curSid);
        }

        function hAmt(fixed) {
            const amt = fixed || parseInt(document.getElementById('customAmt').value);
            if (!amt) return;
            const now = new Date();
            const log = {
                date: now.toLocaleDateString(),
                time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                amt: amt,
                sid: curSid
            };
            historyData.push(log);
            staffData.find(s => s.id === curSid).logs.push(log);
            
            // 結帳後自動移除預約
            const s = staffData.find(x => x.id === curSid);
            if (s.bookings.length > 0) s.bookings.shift();

            document.getElementById('customAmt').value = '';
            closeM('amtModal');
            save();
            showToast();
        }

        function addB() {
            const sid = parseInt(document.getElementById('bookStaff').value);
            const note = document.getElementById('bookNote').value;
            const time = document.getElementById('bookTime').value;
            const dur = document.getElementById('bookDur').value;
            if (!time) return alert('請輸入時間');
            
            staffData.find(s => s.id === sid).bookings.push({ id: Date.now(), time, dur, note });
            save();
            showPage('page-rank');
            showToast();
        }

        function openLog(sid) {
            const s = staffData.find(x => x.id === sid);
            document.getElementById('logTitle').innerText = (sid < 0 ? (sid === -1 ? '1F' : '2F') : sid) + ' 的近期紀錄';
            const list = document.getElementById('logList');
            list.innerHTML = s.logs.length ? s.logs.slice().reverse().map(l => `
                <div class="log-item">
                    <div><b>$${l.amt}</b> <small>${l.time}</small></div>
                    <div style="color:var(--green)">$${Math.floor(l.amt * 0.7)}</div>
                </div>
            `).join('') : '<p style="color:#666">暫無紀錄</p>';
            document.getElementById('logModal').style.display = 'flex';
        }

        function clearRank() { if(confirm('確定清空看板？')){ staffData.forEach(s=>s.inRank=false); save(); }}
        function clearAllLogs() { if(confirm('確定永久清空所有帳目紀錄？')){ historyData=[]; staffData.forEach(s=>s.logs=[]); save(); }}
        function toggleMode() { isBoss = !isBoss; alert(isBoss ? '進入管理模式' : '進入員工模式'); }

        // 初始化分鐘選項
        const dD = document.getElementById('bookDur'); 
        for(let i=15;i<=180;i+=15) dD.innerHTML+=`<option value="${i}">${i} 分</option>`;
        dD.value=60;

        // 初始化金額按鈕
        document.getElementById('priceBtnGroup').innerHTML = [700, 800, 1050, 1200, 1400, 1600].map(p=>`<button class="btn-action" style="background:#444; margin-bottom:0" onclick="hAmt(${p})">${p}</button>`).join('');

        // 將函數掛載到 window 供 HTML 呼叫
        window.showPage = showPage;
        window.tRank = tRank;
        window.openAct = openAct;
        window.closeM = closeM;
        window.handleAct = handleAct;
        window.hAmt = hAmt;
        window.addB = addB;
        window.clearRank = clearRank;
        window.clearAllLogs = clearAllLogs;
        window.toggleMode = toggleMode;

    </script>
</body>
</html>
